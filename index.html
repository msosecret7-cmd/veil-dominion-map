<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <title>Veil Dominion // Planetary Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css"/>
    
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: #050a05; }
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 0; }
        .leaflet-popup-content-wrapper { background: #001a00; color: #d4af37; border: 1px solid #d4af37; font-family: 'Courier New', monospace; }
        .leaflet-popup-tip { background: #d4af37; }
    </style>
</head>
<body>
    <div id="map"></div>
</body>
<script>
    // Initialize Map Centered on Shan State
    var map = L.map("map", {
        center: [20.0, 98.0],
        zoom: 5,
        zoomControl: true,
        preferCanvas: false,
    });

    // Dark Matter Tile Layer
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: "abcd",
        maxZoom: 20
    }).addTo(map);

    // --- 1. TAUNGGYI (THE OMEGA ANCHOR) ---
    L.marker([20.7833, 97.0333], {icon: L.AwesomeMarkers.icon({markerColor: "green", iconColor: "black", icon: "crown", prefix: "fa"})})
        .addTo(map)
        .bindPopup("<b>👑 TAUNGGYI (OMEGA NODE)</b><br>Status: Sovereign HQ<br>Clearance: MSO-7 Active");

    // --- 2. PONG PHA (THE TRANSIT GATE) ---
    L.marker([20.3813, 99.8669], {icon: L.AwesomeMarkers.icon({markerColor: "orange", iconColor: "black", icon: "door-open", prefix: "fa"})})
        .addTo(map)
        .bindPopup("<b>🚪 PONG PHA (TRANSIT)</b><br>Status: Gateway Closed<br>History: Origin Point");

    // --- 3. MT SHASTA (THE SPIRIT MIRROR) ---
    L.marker([41.4116, -122.1862], {icon: L.AwesomeMarkers.icon({markerColor: "purple", iconColor: "white", icon: "eye", prefix: "fa"})})
        .addTo(map)
        .bindPopup("<b>👁️ MT SHASTA</b><br>Status: Spirit Mirror<br>Role: 528Hz Amplifier");

    // --- 4. GIZA (THE TIME CAPSULE) ---
    L.marker([29.9792, 31.1342], {icon: L.AwesomeMarkers.icon({markerColor: "red", iconColor: "white", icon: "hourglass", prefix: "fa"})})
        .addTo(map)
        .bindPopup("<b>⏳ GIZA</b><br>Status: Time Capsule<br>Role: Old Order Archive");

    // --- 5. AUSTRALIA (NEW AGRICULTURE) ---
    L.marker([-25.2744, 133.7751], {icon: L.AwesomeMarkers.icon({markerColor: "blue", iconColor: "white", icon: "seedling", prefix: "fa"})})
        .addTo(map)
        .bindPopup("<b>🌱 AUSTRALIA</b><br>Status: New Agriculture<br>Role: Food Security Node");

    // --- 6. ANTARCTICA (THE FUTURE) ---
    L.marker([-80.0, -120.0], {icon: L.AwesomeMarkers.icon({markerColor: "white", iconColor: "black", icon: "snowflake", prefix: "fa"})})
        .addTo(map)
        .bindPopup("<b>❄️ ANTARCTICA</b><br>Status: Frozen Future<br>Role: The Final Safe Zone");

</script>
</html></body>
</html>
