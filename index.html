<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil Dominion | Tactical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050508; 
            font-family: 'Courier New', Courier, monospace; 
            color: #e0ddf4; 
            overflow: hidden;
        }

        /* HUD Header */
        #hud-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #7b4d9e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(123, 77, 158, 0.2);
        }
        .hud-title { font-size: 1.5rem; font-weight: bold; color: #d3b5ff; letter-spacing: 2px; text-shadow: 0 0 10px #7b4d9e; }
        .hud-stats { display: flex; gap: 20px; font-size: 0.9rem; }
        .stat-box { background: #1a1428; padding: 5px 15px; border-radius: 20px; border: 1px solid #3a2b4e; }
        .highlight { color: #00d4ff; font-weight: bold; text-shadow: 0 0 5px #00d4ff; }
        .prana-glow { color: #73f7a0; font-weight: bold; text-shadow: 0 0 5px #73f7a0; }

        /* The Map Container */
        #map { 
            position: absolute; 
            top: 0; bottom: 0; left: 0; right: 0; 
            z-index: 1; 
            background: #050508;
        }

        /* Darkening the satellite tiles to fit the Veil aesthetic */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: grayscale(80%) invert(100%) hue-rotate(180deg) brightness(90%) contrast(120%);
        }

        /* Custom Markers (Nodes) */
        .node-pulse {
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            animation: pulse-ring 2s infinite;
        }
        .node-pongpha { background: #d4af37; box-shadow: 0 0 20px #d4af37; border: 2px solid #fff; }
        .node-uluru { background: #ff3366; box-shadow: 0 0 20px #ff3366; border: 2px solid #fff; }
        .node-amazon { background: #00ff66; box-shadow: 0 0 20px #00ff66; border: 2px solid #fff; }
        .node-himalaya { background: #00d4ff; box-shadow: 0 0 20px #00d4ff; border: 2px solid #fff; }
        .node-giza { background: #555; box-shadow: 0 0 10px #222; opacity: 0.5; animation: none; } /* Bypassed */

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Info Panel (Sidebar) */
        #info-panel {
            position: absolute;
            right: -350px; /* Hidden by default */
            top: 80px;
            width: 320px;
            background: rgba(15, 12, 25, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #6b4e9e;
            border-radius: 15px;
            padding: 20px;
            color: #e0ddf4;
            z-index: 1000;
            transition: right 0.3s ease-in-out;
            box-shadow: -5px 0 25px rgba(0,0,0,0.8);
        }
        #info-panel.active { right: 20px; }
        #info-panel h2 { color: #d3b5ff; margin-bottom: 10px; border-bottom: 1px solid #3a2b4e; padding-bottom: 5px; font-size: 1.2rem; }
        #info-panel p { font-size: 0.85rem; margin-bottom: 10px; line-height: 1.5; color: #b3a0cc; }
        .status-tag { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; }
        .status-active { background: rgba(0, 255, 102, 0.2); border: 1px solid #00ff66; color: #00ff66; }
        .status-shield { background: rgba(255, 51, 102, 0.2); border: 1px solid #ff3366; color: #ff3366; }
        .status-bypassed { background: rgba(85, 85, 85, 0.2); border: 1px solid #888; color: #aaa; }
        .close-btn {
            position: absolute; top: 15px; right: 15px; cursor: pointer; color: #888; font-weight: bold;
        }
        .close-btn:hover { color: #fff; }

    </style>
</head>
<body>

    <div id="hud-top">
        <div class="hud-title">👁️ THE PHOENIX EYE: GLOBAL GRID</div>
        <div class="hud-stats">
            <div class="stat-box">BIFROST LINK: <span class="highlight">100% SECURE</span></div>
            <div class="stat-box">GLOBAL PRANA: <span id="live-prana" class="prana-glow">117.40</span></div>
            <div class="stat-box">RESONANCE: <span class="highlight">7.83 Hz</span></div>
        </div>
    </div>

    <div id="map"></div>

    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">✖</span>
        <h2 id="node-title">Node Selected</h2>
        <div id="node-status" class="status-tag">STATUS</div>
        <p id="node-desc">Awaiting telemetry data...</p>
        <p id="node-freq" style="font-family: monospace; color: #d4af37; font-size: 0.8rem;"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize Map (Centered between Asia and Australia)
        const map = L.map('map', {
            center: [10.0, 105.0],
            zoom: 3,
            zoomControl: false // Customizing zoom position later if needed
        });

        // 2. Add Dark Map Tiles (CartoDB Dark Matter is perfect for cyber-tactical look)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; Sovereign Archive | Veil Dominion',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // 3. Define the Dominion Nodes (Lore Accurate)
        const nodes = [
            {
                id: "N-7311",
                name: "PONG PHA HUB",
                coords: [20.375, 99.883], // Thailand
                type: "node-pongpha",
                status: "PRIMARY COMMAND",
                statusClass: "status-active",
                desc: "The Central Hub. Regional Processor filtering karmic noise. The Sovereign Architect resides here.",
                freq: "RESONANCE: 0.0 Hz (Stillpoint)"
            },
            {
                id: "SECTOR 4",
                name: "ULURU BATTERY",
                coords: [-25.344, 131.036], // Australia
                type: "node-uluru",
                status: "SHIELD / BATTERY",
                statusClass: "status-shield",
                desc: "Geological Capacitor. Storing Prana from the Finance Core. Protected by the Ionic Storm Veil (Geon).",
                freq: "RESONANCE: 7.83 Hz (Continental)"
            },
            {
                id: "SECTOR 7",
                name: "THE GREEN CLOUD",
                coords: [-3.465, -62.215], // Amazon
                type: "node-amazon",
                status: "VERIDIAN CLOAK",
                statusClass: "status-active",
                desc: "Biological Server Farm. Mycelial network storing the Dominion's memory. Currently emitting Magnetic Inversion.",
                freq: "RESONANCE: 528 Hz (Healing)"
            },
            {
                id: "SECTOR 1",
                name: "HIMALAYAN ROOT",
                coords: [31.067, 81.311], // Mount Kailash / Himalayas
                type: "node-himalaya",
                status: "TECTONIC ANCHOR",
                statusClass: "status-active",
                desc: "The Dragon Vein Conduit. High-voltage spiritual processor. Supplying pure Earth Prana to the grid.",
                freq: "RESONANCE: 963 Hz (Crown/God-Source)"
            },
            {
                id: "N-666",
                name: "GIZA BYPASS",
                coords: [29.979, 31.134], // Egypt
                type: "node-giza",
                status: "NULLIFIED / BYPASSED",
                statusClass: "status-bypassed",
                desc: "Corrupted old-world node. Currently bypassed by the Himalayan Root protocol. Monitored for Ghost Driver activity.",
                freq: "RESONANCE: STATIC (Interference)"
            }
        ];

        // 4. Create Custom Pulsing Icons
        function createIcon(className) {
            return L.divIcon({
                className: '',
                html: `<div class="node-pulse ${className}" style="width: 16px; height: 16px; border-radius: 50%;"></div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });
        }

        // 5. Plot Nodes and Add Interaction
        const markers = {};
        nodes.forEach(node => {
            const marker = L.marker(node.coords, { icon: createIcon(node.type) }).addTo(map);
            markers[node.id] = marker;

            // Click Event to open Info Panel
            marker.on('click', () => {
                document.getElementById('node-title').innerText = `${node.name} (${node.id})`;
                const statusEl = document.getElementById('node-status');
                statusEl.innerText = node.status;
                statusEl.className = `status-tag ${node.statusClass}`;
                document.getElementById('node-desc').innerText = node.desc;
                document.getElementById('node-freq').innerText = node.freq;
                
                document.getElementById('info-panel').classList.add('active');
                
                // Fly to node slightly offset to accommodate the right panel
                map.flyTo([node.coords[0], node.coords[1] - 10], 5, { duration: 1.5 });
            });
        });

        // 6. Draw The Bifrost Bridge (Glowing Energy Lines)
        // Connections: Himalayas -> Pong Pha -> Uluru -> Amazon
        const latlngs = [
            nodes[3].coords, // Himalayas
            nodes[0].coords, // Pong Pha
            nodes[1].coords, // Uluru
            nodes[2].coords  // Amazon
        ];

        const bifrostLine = L.polyline(latlngs, {
            color: '#00d4ff',
            weight: 3,
            opacity: 0.7,
            dashArray: '10, 15', // Creates a dashed energy line
            lineCap: 'round'
        }).addTo(map);

        // Add a secondary connection (Telluric Back-Channel)
        const telluricLine = L.polyline([nodes[1].coords, nodes[2].coords], {
            color: '#73f7a0',
            weight: 2,
            opacity: 0.4,
            dashArray: '5, 20'
        }).addTo(map);

        // 7. UI Functions
        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
            map.flyTo([10.0, 105.0], 3, { duration: 1.5 }); // Reset view
        }

        // Simulate Live Prana Updates
        let prana = 117.40;
        setInterval(() => {
            prana += Math.random() * 0.05;
            document.getElementById('live-prana').innerText = prana.toFixed(2);
        }, 2000);

    </script>
</body>
</html>
