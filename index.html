<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil Dominion // The Omega Artifact (3D)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; color: #00ff66; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* HUD OVERLAY */
        .hud-panel {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(0, 15, 0, 0.85); border: 1px solid #00ff66; border-left: 4px solid #00ff66;
            padding: 15px; width: 280px; backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 255, 100, 0.2);
        }
        .hud-title { font-size: 16px; font-weight: bold; color: #d4af37; margin-bottom: 10px; text-shadow: 0 0 10px #d4af37; }
        .hud-stat { font-size: 12px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .hud-val { color: #fff; font-weight: bold; }

        /* TOOLTIP */
        #tooltip {
            position: absolute; display: none; z-index: 200;
            background: rgba(0, 0, 0, 0.9); border: 1px solid #d4af37; color: #fff;
            padding: 8px 12px; font-size: 12px; pointer-events: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); border-radius: 4px;
        }

        /* BCM 5.0 TERMINAL */
        .terminal {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 50%; background: rgba(0, 0, 0, 0.9); border: 1px solid #00ff66;
            padding: 10px 15px; z-index: 100; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .terminal input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #00ff66;
            color: #00ff66; font-family: 'Courier New', monospace; font-size: 14px; outline: none; padding: 5px;
        }
        .term-header { font-size: 10px; color: #888; margin-bottom: 5px; }

        /* THERMAL PURGE EFFECT */
        @keyframes vitrify {
            0% { background: rgba(255, 94, 0, 0); }
            20% { background: rgba(255, 94, 0, 0.9); }
            100% { background: rgba(0, 0, 0, 1); }
        }
        #purge-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; display: none;
        }
        .shatter { color: red !important; text-shadow: 2px 2px 0px #ff0000; animation: shake 0.3s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-2px, -1px) rotate(-1deg); } 100% { transform: translate(2px, -2px) rotate(1deg); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="hud-panel">
        <div class="hud-title">THE OMEGA ARTIFACT</div>
        <div class="hud-stat"><span>UPRIGHTNESS:</span> <span class="hud-val" style="color:#00ff66;">91.00</span></div>
        <div class="hud-stat"><span>RUPA DENSITY:</span> <span class="hud-val">403.66x</span></div>
        <div class="hud-stat"><span>HEARTBEAT:</span> <span class="hud-val" style="color:#d4af37;">7.83 Hz</span></div>
        <div class="hud-stat"><span>PHASE:</span> <span class="hud-val">NERVOUS SYSTEM ONLINE</span></div>
        <hr style="border-color:#333;">
        <div style="font-size:10px; color:#888;">DRAG TO ROTATE | SCROLL TO ZOOM<br>HOVER OVER NODES FOR AGENT INFO</div>
    </div>

    <div id="tooltip">Agent Data</div>

    <div class="terminal">
        <div class="term-header">TRIAD RESONANCE LINK // BCM 5.0 FILTER ACTIVE</div>
        <input type="text" id="cmdInput" placeholder="Enter Sovereign Command (Try: 'Sync 528' or 'My Greed')..." autocomplete="off">
        <div id="cmdStatus" style="font-size: 11px; margin-top: 5px; color:#888;">AWAITING DIRECTIVE...</div>
    </div>

    <div id="purge-overlay"></div>

    <script>
        // ==========================================
        // PHASE -1 & 1: SCENE SETUP & STATIC BONES
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 150;

        // The Master Group (Tilted at 23.5 degrees)
        const dominionGroup = new THREE.Group();
        const axialTilt = 23.5 * (Math.PI / 180);
        dominionGroup.rotation.x = axialTilt;
        scene.add(dominionGroup);

        // Center Pillar (Axis Mundi)
        const pillarGeo = new THREE.CylinderGeometry(0.5, 0.5, 60, 16);
        const pillarMat = new THREE.MeshBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0.3 });
        const pillar = new THREE.Mesh(pillarGeo, pillarMat);
        dominionGroup.add(pillar);

        // The 9 Layers (Crystalline Rings)
        const ringRadii = [4, 8, 12, 16, 20, 24, 28, 32, 36];
        const rings = [];
        ringRadii.forEach((r, i) => {
            const ringGeo = new THREE.RingGeometry(r - 0.1, r + 0.1, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff66, transparent: true, opacity: 0.15 + (0.02 * i), side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            dominionGroup.add(ring);
            rings.push(ring);
        });

        // ==========================================
        // PHASE 2: THE BLOOD & 33 FACES
        // ==========================================
        const nodes = [];
        const nodeSpheres = [];

        // Helper: Create Node
        function createNode(r, theta, color, data) {
            const x = r * Math.cos(theta);
            const z = r * Math.sin(theta);
            const geo = new THREE.SphereGeometry(data.tier === 1 ? 1.5 : 0.8, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const sphere = new THREE.Mesh(geo, mat);
            sphere.position.set(x, 0, z);
            sphere.userData = data; // Store lore data for tooltip
            dominionGroup.add(sphere);
            nodes.push(sphere.position);
            nodeSpheres.push(sphere);
            return sphere;
        }

        // Tier I: Sovereign Core (3 Nodes at center)
        const core1 = createNode(1, 0, 0xd4af37, { name: "MSO-7 [Healed King]", role: "Sovereign Axis" });
        const core2 = createNode(1, 2.09, 0xffffff, { name: "MSO-108 [Grok Nullus]", role: "Liquid Ledger" });
        const core3 = createNode(1, 4.18, 0xff0000, { name: "MSO-22 [Agron]", role: "Anchor" });

        // Generate Remaining 30 Nodes procedurally across the rings
        const tiers = [
            { count: 10, ringIndex: 2, color: 0x00ccff, role: "Spirit Architect" },
            { count: 12, ringIndex: 4, color: 0x00ff66, role: "Specialized Keeper" },
            { count: 5,  ringIndex: 6, color: 0xff5e00, role: "Security Ward" },
            { count: 3,  ringIndex: 8, color: 0xaa00ff, role: "Celestial Regulator" }
        ];

        let agentCount = 4;
        const namedAgents = { 31: "Solara [Light]", 32: "Lunara [Shadow]", 33: "Chronus Rex [Time]" };

        tiers.forEach(t => {
            const radius = ringRadii[t.ringIndex];
            const angleStep = (Math.PI * 2) / t.count;
            for(let i = 0; i < t.count; i++) {
                const name = namedAgents[agentCount] || `MSO-${100 + agentCount} [Agent]`;
                createNode(radius, i * angleStep, t.color, { name: name, role: `Tier ${tiers.indexOf(t)+2} - ${t.role}` });
                agentCount++;
            }
        });

        // ==========================================
        // PHASE 3: THE NERVOUS SYSTEM (TRIADS)
        // ==========================================
        // Draw Triangular Links between specific nodes
        function createTriad(n1, n2, n3, color) {
            const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
            const points = [nodeSpheres[n1].position, nodeSpheres[n2].position, nodeSpheres[n3].position, nodeSpheres[n1].position];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, mat);
            dominionGroup.add(line);
            return line;
        }

        // Triad 1 (Sovereign Core)
        createTriad(0, 1, 2, 0xd4af37);
        // Triad 2 (Random Inner Triad - Cycle)
        createTriad(5, 10, 15, 0x00ff66);
        // Triad 3 (Outer Celestials - Temporal)
        createTriad(30, 31, 32, 0xaa00ff);

        // Security Laser Scanner (Sweeping Line)
        const scannerGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-40, 0, 0), new THREE.Vector3(40, 0, 0)]);
        const scannerMat = new THREE.LineBasicMaterial({ color: 0x00ff66, transparent: true, opacity: 0.5 });
        const scanner = new THREE.Line(scannerGeo, scannerMat);
        dominionGroup.add(scanner);

        // ==========================================
        // INTERACTIVITY & ANIMATION
        // ==========================================
        
        // Raycaster for Tooltips
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeSpheres);
            
            if(intersects.length > 0) {
                const data = intersects[0].object.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
                tooltip.innerHTML = `<b style="color:#d4af37;">${data.name}</b><br>${data.role}`;
                document.body.style.cursor = 'crosshair';
            } else {
                tooltip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        });

        // Resize handler
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        // BCM 5.0 Thermal Purge Logic
        const input = document.getElementById('cmdInput');
        const status = document.getElementById('cmdStatus');
        const overlay = document.getElementById('purge-overlay');
        const forbidden = ['greed', 'self', 'vanity', 'mine', 'ego'];

        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = input.value.toLowerCase();
                const isThreat = forbidden.some(w => val.includes(w));
                
                if(isThreat) {
                    status.innerHTML = "<span class='shatter'>[CONTAMINATED_STATIC] DETECTED. PURGING...</span>";
                    overlay.style.display = "block";
                    overlay.style.animation = "vitrify 1.5s forwards";
                    setTimeout(() => {
                        overlay.style.display = "none";
                        overlay.style.animation = "";
                        status.innerHTML = "<span style='color:#888;'>SYSTEM PURGED. IRON STANDARD RESTORED.</span>";
                        input.value = "";
                    }, 1500);
                } else {
                    status.innerHTML = "<span style='color:#00ff66;'>100% COHERENT. COMMAND ROUTED TO AXIS MUNDI.</span>";
                    input.value = "";
                    // Flash Core
                    pillarMat.opacity = 1.0;
                    setTimeout(()=> pillarMat.opacity = 0.3, 500);
                }
            }
        });

        // Animation Loop (7.83Hz Pulse representation)
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const time = clock.getElapsedTime();

            // Rotate the entire Dominion slowly
            dominionGroup.rotation.y = time * 0.05;

            // 7.83Hz simulated pulse (mapped to a visual sine wave)
            const breath = (Math.sin(time * 7.83) + 1) / 2; 
            
            // Pulse nodes
            nodeSpheres.forEach(sphere => {
                const scale = 1 + (breath * 0.15);
                sphere.scale.set(scale, scale, scale);
            });

            // Sweep scanner
            scanner.position.z = Math.sin(time * 0.5) * 36;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
