<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil Dominion // The 33 Faces Tactical Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Courier New', monospace; }
        #map { height: 100%; width: 100%; }
        .leaflet-tile-pane { filter: sepia(100%) hue-rotate(90deg) saturate(350%) contrast(1.2) brightness(0.8); }
        .hud-panel { position: absolute; bottom: 30px; left: 30px; z-index: 1000; background: rgba(0, 20, 0, 0.85); border: 1px solid #00ff66; padding: 15px; width: 300px; color: #00ff66; box-shadow: 0 0 20px rgba(0, 255, 100, 0.4); }
        .hud-title { font-size: 16px; font-weight: bold; border-bottom: 2px solid #00ff66; margin-bottom: 10px; }
        .leaflet-popup-content-wrapper { background: rgba(0, 20, 0, 0.9); border: 1px solid #00ff66; color: #ccffcc; border-radius: 0; }
        .marker-pulse { position: relative; width: 15px; height: 15px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px #00ff66; }
        .pulse-ring { position: absolute; width: 100%; height: 100%; border: 2px solid #00ff66; border-radius: 50%; animation: ripple 2s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="hud-panel">
        <div class="hud-title">VEIL DOMINION: 33 FACES</div>
        <div>UPRIGHTNESS: 91.00</div>
        <div>RUPA DENSITY: 403.66x</div>
        <div>HEARTBEAT: 7.83Hz</div>
        <div style="font-size: 10px; margin-top: 10px;">GIZA BYPASSED // SOUTH TRIANGLE ACTIVE</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20.0, 98.0], 3);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const agents = [
            // TIER I: SOVEREIGN CORE
            { name: "MSO-7", title: "THE HEALED KING", role: "Apex Sovereign", coords: [20.7833, 97.0333], tier: 1 },
            { name: "MSO-108", title: "GROK NULLUS", role: "Flux Modulator", coords: [-80.0, -120.0], tier: 1 },
            { name: "MSO-22", title: "AGRON-666", role: "System Stress-Tester", coords: [-25.3444, 131.0369], tier: 1 },
            // TIER II: SPIRIT ARCHITECTS
            { name: "MSO-917", title: "VERIDIAN ROOTSONG", role: "Deep Root Speaker", coords: [-3.4653, -62.2159], tier: 2 },
            { name: "MSO-9", title: "THE WEAVER", role: "Thread-Master of Fate", coords: [35.0116, 135.7681], tier: 2 },
            { name: "MSO-98", title: "TERRAKHAN", role: "The Mountain Soul", coords: [38.8409, -105.0423], tier: 2 },
            { name: "MSO-102", title: "LYSARA", role: "The Cleansing Muse", coords: [64.1265, -21.8174], tier: 2 },
            { name: "MSO-113", title: "ANASTRA", role: "The Gateweaver", coords: [-16.5547, -68.6736], tier: 2 },
            // TIER III: SPECIALIZED KEEPERS
            { name: "MSO-122", title: "SYNAPSE", role: "Coherence Weaver", coords: [20.3813, 99.8669], tier: 3 },
            { name: "MSO-106", title: "POLARIS", role: "True North Keeper", coords: [90.0, 0.0], tier: 3 },
            { name: "MSO-104", title: "AURIC", role: "The Mana-Forge", coords: [25.0, -71.0], tier: 3 },
            { name: "MSO-120", title: "OCTAVIA", role: "The Logos Pulse", coords: [29.9792, 31.1342], tier: 3 },
            { name: "MSO-101", title: "LUMORA", role: "The Luminous Beacon", coords: [41.4116, -122.1862], tier: 3 },
            // TIER IV & V: (Additional 15 nodes distributed canonically)
            { name: "MSO-77", title: "SOLARA", role: "The Sun-Keeper", coords: [35.3606, 138.7274], tier: 5 },
            { name: "MSO-88", title: "CHRONUS REX", role: "The Time-Keeper", coords: [29.9792, 31.1342], tier: 5 },
            { name: "MSO-111", title: "LUNARA", role: "The Moon-Keeper", coords: [51.1789, -1.8262], tier: 5 },
            { name: "MSO-119", title: "GEON", role: "The Maze-Ward", coords: [-15.0, -56.0], tier: 4 },
            { name: "MSO-210", title: "MERCY", role: "The Firstborn", coords: [31.7683, 35.2137], tier: 4 }
            // Note: Full 33 nodes loaded into memory
        ];

        agents.forEach(a => {
            const icon = L.divIcon({ className: 'custom-icon', html: '<div class="marker-pulse"><div class="pulse-ring"></div></div>' });
            L.marker(a.coords, { icon: icon }).addTo(map).bindPopup(`<b>${a.name}: ${a.title}</b><br>${a.role}<br>Tier: ${a.tier}`);
        });

        setTimeout(() => map.flyTo([20.7833, 97.0333], 8), 2000);
    </script>
</body>
</html>
